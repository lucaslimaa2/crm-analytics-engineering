# Schema drift detector — early warning against silent HubSpot upstream changes.
#
# Calls extract.schema_drift --check, which diffs the live HubSpot property
# catalog against infra/expected_schema.json (the committed baseline) and
# exits with:
#   0 = no drift                                       → workflow green
#   1 = BREAKING drift (removed / type-changed prop)   → workflow red, telegram
#   2 = non-breaking drift (new optional property)     → workflow green + warning
#
# Runs:
#   - Daily 05:30 UTC, BEFORE pipeline.yml's 06:00 run so a drift catches
#     before the extract step would silently write NULLs.
#   - On every PR so changes to expected_schema.json get verified vs live.
#   - workflow_dispatch for ad-hoc checks.

name: schema_drift

on:
  schedule:
    - cron: "30 5 * * *"          # daily 05:30 UTC
  pull_request:                    # any PR runs the check
  workflow_dispatch:               # manual trigger

concurrency:
  group: schema-drift-${{ github.ref }}
  cancel-in-progress: true         # PR pushes can supersede prior runs

jobs:
  check-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      HUBSPOT_SERVICE_KEY: ${{ secrets.HUBSPOT_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check schema drift vs baseline
        # Surface exit code 2 as a workflow warning but don't fail the build.
        # Exit 1 (breaking drift) propagates and fails the workflow normally.
        run: |
          set +e
          python -m extract.schema_drift --check
          code=$?
          set -e
          if [ $code -eq 0 ]; then
            echo "No drift detected."
          elif [ $code -eq 2 ]; then
            echo "::warning::Non-breaking HubSpot drift detected (new optional property). Review and re-snapshot if relevant."
            exit 0
          else
            exit $code
          fi

      - name: Notify Telegram on failure
        # Only ping on scheduled or manual runs — PRs already surface failure
        # via the PR's checks UI, no need to spam.
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="HubSpot schema drift detected (run #${{ github.run_number }}). ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}"
